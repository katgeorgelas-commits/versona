# Versona local Supabase config. `supabase start` boots Postgres + Auth + Storage + Realtime.
project_id = "versona"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true

# OAuth providers are configured here when the auth feature is built (last).
# [auth.external.google]
# enabled = true
# [auth.external.linkedin_oidc]
# enabled = true

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "5MiB"
